name: Gist Tunnel Relay
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Run Gist Tunnel Relay Agent
        env:
          COMMAND_GIST_ID: ${{ secrets.COMMAND_GIST_ID }}
          RESPONSE_GIST_ID: ${{ secrets.RESPONSE_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          
          COMMAND_GIST="$COMMAND_GIST_ID"
          RESPONSE_GIST="$RESPONSE_GIST_ID"
          TOKEN="$GITHUB_TOKEN"
          
          echo "=== Gist Tunnel Relay Agent Started ==="
          echo "Command Gist: $COMMAND_GIST"
          echo "Response Gist: $RESPONSE_GIST"
          echo "========================================"
          
          # API helper using curl (works fine on Azure runner)
          api() {
            curl -s -H "Authorization: token $TOKEN" "$@"
          }
          
          # Main polling loop
          while true; do
            # Fetch command gist
            GIST=$(api "https://api.github.com/gists/$COMMAND_GIST")
            RAW_URL=$(echo "$GIST" | jq -r '.files["command.json"].raw_url // empty')
            
            if [ -z "$RAW_URL" ]; then
              sleep 2
              continue
            fi
            
            DATA=$(api "$RAW_URL")
            JOB_ID=$(echo "$DATA" | jq -r '.id // empty')
            
            if [ -z "$JOB_ID" ]; then
              sleep 2
              continue
            fi
            
            # Skip if already processed
            STATE_FILE="/tmp/processed_${JOB_ID}"
            if [ -f "$STATE_FILE" ]; then
              sleep 2
              continue
            fi
            touch "$STATE_FILE"
            
            HOST=$(echo "$DATA" | jq -r '.host')
            PORT=$(echo "$DATA" | jq -r '.port')
            PAYLOAD_B64=$(echo "$DATA" | jq -r '.payload // ""')
            
            echo "[$(date -u +%H:%M:%S)] Processing job: $JOB_ID -> $HOST:$PORT"
            
            # Decode payload
            if [ -n "$PAYLOAD_B64" ] && [ "$PAYLOAD_B64" != "null" ]; then
              PAYLOAD=$(echo "$PAYLOAD_B64" | base64 -d 2>/dev/null || true)
            else
              PAYLOAD=""
            fi
            
            # TCP connection using bash /dev/tcp
            RESPONSE=""
            if timeout 30 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null; then
              exec {fd}<>/dev/tcp/$HOST/$PORT 2>/dev/null || true
              if [ -n "$PAYLOAD" ]; then
                printf '%s' "$PAYLOAD" >&$fd 2>/dev/null || true
              fi
              # Read response with timeout
              while IFS= read -r -t 5 line || [ -n "$line" ]; do
                RESPONSE+="$line"$'\n'
              done <&$fd 2>/dev/null || true
              exec {fd}>&- 2>/dev/null || true
            fi
            
            # Encode response
            RESPONSE_B64=$(printf '%s' "$RESPONSE" | base64 -w0 2>/dev/null || echo "")
            
            # Build response JSON
            RESPONSE_JSON=$(jq -n \
              --arg id "$JOB_ID" \
              --arg resp "$RESPONSE_B64" \
              '{id: $id, response: $resp}')
            
            # Update response gist
            ESCAPED=$(printf '%s' "$RESPONSE_JSON" | jq -Rs .)
            api --request PATCH "https://api.github.com/gists/$RESPONSE_GIST" \
              -d "{\"files\":{\"response.json\":{\"content\":$ESCAPED}}}" > /dev/null 2>&1
            
            echo "[$(date -u +%H:%M:%S)] Response sent for job: $JOB_ID ($(echo "$RESPONSE" | wc -c) bytes)"
            sleep 1
          done
