name: Gist Tunnel Relay
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Run Gist Tunnel Relay Agent
        env:
          COMMAND_GIST_ID: ${{ secrets.COMMAND_GIST_ID }}
          RESPONSE_GIST_ID: ${{ secrets.RESPONSE_GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_PAT }}
        shell: bash
        run: |
          echo "=== Gist Tunnel Relay Agent Started ==="
          echo "Command Gist: $COMMAND_GIST_ID"
          echo "Response Gist: $RESPONSE_GIST_ID"
          echo "========================================"
          
          # API helper using curl (works fine on Azure runner)
          api() {
            curl -s -H "Authorization: token $GH_TOKEN" "$@"
          }
          
          # Main polling loop
          while true; do
            # Fetch command gist
            GIST=$(api "https://api.github.com/gists/$COMMAND_GIST_ID")
            RAW_URL=$(echo "$GIST" | jq -r '.files["command.json"].raw_url // empty')
            
            if [ -z "$RAW_URL" ]; then
              sleep 2
              continue
            fi
            
            DATA=$(api "$RAW_URL")
            JOB_ID=$(echo "$DATA" | jq -r '.id // empty')
            
            if [ -z "$JOB_ID" ]; then
              sleep 2
              continue
            fi
            
            # Skip if already processed
            STATE_FILE="/tmp/processed_${JOB_ID}"
            if [ -f "$STATE_FILE" ]; then
              sleep 2
              continue
            fi
            touch "$STATE_FILE"
            
            HOST=$(echo "$DATA" | jq -r '.host')
            PORT=$(echo "$DATA" | jq -r '.port')
            PAYLOAD_B64=$(echo "$DATA" | jq -r '.payload // ""')
            
            echo "[$(date -u +%H:%M:%S)] Processing job: $JOB_ID -> $HOST:$PORT"
            
            # Decode payload
            if [ -n "$PAYLOAD_B64" ] && [ "$PAYLOAD_B64" != "null" ]; then
              PAYLOAD=$(echo "$PAYLOAD_B64" | base64 -d 2>/dev/null || true)
            else
              PAYLOAD=""
            fi
            
            # For HTTP/HTTPS, use curl (much more reliable than /dev/tcp)
            RESPONSE=""
            if [ "$PORT" = "80" ] || [ "$PORT" = "443" ]; then
              PROTO="http"
              [ "$PORT" = "443" ] && PROTO="https"
              
              # Extract path from HTTP request payload
              HTTP_PATH="/"
              if [ -n "$PAYLOAD" ]; then
                HTTP_PATH=$(echo "$PAYLOAD" | head -1 | awk '{print $2}')
                [ -z "$HTTP_PATH" ] && HTTP_PATH="/"
              fi
              
              FULL_URL="${PROTO}://${HOST}${HTTP_PATH}"
              echo "[$(date -u +%H:%M:%S)] Fetching: $FULL_URL"
              
              # Use curl with headers and body
              RESPONSE=$(curl -sS --max-time 30 -D - "$FULL_URL" 2>&1 || echo "CURL_ERROR: $?")
              echo "[$(date -u +%H:%M:%S)] Response size: $(echo "$RESPONSE" | wc -c) bytes"
            else
              # For non-HTTP ports, use bash /dev/tcp
              if timeout 30 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null; then
                exec 3<>/dev/tcp/$HOST/$PORT 2>/dev/null || true
                if [ -n "$PAYLOAD" ]; then
                  printf '%s' "$PAYLOAD" >&3 2>/dev/null || true
                fi
                # Read response with timeout
                while IFS= read -r -t 5 line || [ -n "$line" ]; do
                  RESPONSE+="$line"$'\n'
                done <&3 2>/dev/null || true
                exec 3>&- 2>/dev/null || true
              fi
            fi
            
            # Encode response
            RESPONSE_B64=$(printf '%s' "$RESPONSE" | base64 -w0 2>/dev/null || echo "")
            
            # Build response JSON
            RESPONSE_JSON=$(jq -n \
              --arg id "$JOB_ID" \
              --arg resp "$RESPONSE_B64" \
              '{id: $id, response: $resp}')
            
            # Update response gist
            ESCAPED=$(printf '%s' "$RESPONSE_JSON" | jq -Rs .)
            api --request PATCH "https://api.github.com/gists/$RESPONSE_GIST_ID" \
              -d "{\"files\":{\"response.json\":{\"content\":$ESCAPED}}}" > /dev/null 2>&1
            
            echo "[$(date -u +%H:%M:%S)] Response sent for job: $JOB_ID ($(echo "$RESPONSE" | wc -c) bytes)"
            sleep 1
          done
