name: Gist Tunnel Relay
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run Relay Agent
        env:
          COMMAND_GIST_ID: ${{ secrets.COMMAND_GIST_ID }}
          RESPONSE_GIST_ID: ${{ secrets.RESPONSE_GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python relay_agent.py
