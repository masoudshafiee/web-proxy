name: Puppeteer Fetch
on:
  issues:
    types: [opened]
jobs:
  fetch:
    if: contains(github.event.issue.title, 'PUPPETEER:')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Puppeteer
        run: |
          npm install puppeteer
      - name: Fetch with browser and post as comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          URL="${{ github.event.issue.body }}"
          echo "Fetching: $URL"
          
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
            
            console.log('Navigating to: $URL');
            await page.goto('$URL', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });
            
            const content = await page.content();
            console.log('Content length:', content.length);
            
            // Save to file
            const fs = require('fs');
            fs.writeFileSync('output.html', content);
            
            await browser.close();
          })();
          "
          
          # Post content as comment using GitHub API
          echo "Posting comment to issue #$ISSUE_NUMBER..."
          COMMENT=$(cat output.html | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $COMMENT}" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments"
          
          echo "Comment posted!"
